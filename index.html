<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prison Builder</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
      #app { width: 100vw; height: 100vh; display: block; }
      canvas { display: block; width: 100%; height: 100%; }
      #hud {
        position: fixed; left: 12px; bottom: 12px;
        font: 12px/1.4 ui-monospace, monospace; color: #cfd3da;
        background: rgba(0,0,0,0.45); padding: 8px 10px; border-radius: 6px;
        pointer-events: none; user-select: none; white-space: pre;
      }
      #err {
        position: fixed; inset: 0; display: none; place-items: center;
        font: 14px/1.6 ui-monospace, monospace; color: #ff9b9b; padding: 24px;
        text-align: center; background: #0a0a0a;
      }
      .btn {
        position: fixed; right: 14px;
        font: 600 13px/1 ui-sans-serif, system-ui, sans-serif;
        color: #e9edf4; background: rgba(24,27,34,0.82);
        border: 1px solid rgba(255,255,255,0.16); border-radius: 8px;
        padding: 10px 14px; cursor: pointer; user-select: none;
        backdrop-filter: blur(6px); transition: background 0.12s, border-color 0.12s;
      }
      .btn:hover { background: rgba(40,44,54,0.92); border-color: rgba(255,255,255,0.28); }
      .btn:active { transform: translateY(1px); }
      .btn:disabled { opacity: 0.5; cursor: default; }
      #roofBtn { bottom: 14px; }
      #roofBtn.off { color: #9fe6b0; border-color: rgba(120,230,150,0.4); }
      #qualBtn { bottom: 54px; }
      /* Top-right clock + regime */
      #clockbox {
        position: fixed; top: 14px; right: 14px; display: flex; flex-direction: column;
        gap: 6px; align-items: flex-end; user-select: none;
        font: 600 13px/1 ui-sans-serif, system-ui, sans-serif;
      }
      #clock {
        color: #e9edf4; background: rgba(24,27,34,0.82); border: 1px solid rgba(255,255,255,0.16);
        border-radius: 8px; padding: 10px 14px; backdrop-filter: blur(6px);
        font: 700 15px/1 ui-monospace, monospace;
      }
      #speeds { display: flex; gap: 4px; }
      .spd {
        color: #cfd3da; background: rgba(24,27,34,0.82); border: 1px solid rgba(255,255,255,0.16);
        border-radius: 6px; padding: 7px 9px; cursor: pointer; backdrop-filter: blur(6px);
      }
      .spd.on { background: rgba(60,90,140,0.92); border-color: rgba(140,180,240,0.7); color: #fff; }
      #regimeBtn {
        color: #f0c674; background: rgba(24,27,34,0.82); border: 1px solid rgba(255,255,255,0.16);
        border-radius: 8px; padding: 9px 14px; cursor: pointer; backdrop-filter: blur(6px);
      }
      #regimePanel {
        position: fixed; top: 120px; right: 14px; display: none; flex-direction: column;
        gap: 2px; background: rgba(18,20,26,0.94); border: 1px solid rgba(255,255,255,0.18);
        border-radius: 10px; padding: 10px; backdrop-filter: blur(8px); max-height: 70vh;
        overflow-y: auto; font: 600 12px/1 ui-monospace, monospace;
      }
      .reg-row { display: flex; align-items: center; gap: 8px; }
      .reg-hour { color: #8b93a2; width: 44px; text-align: right; }
      .reg-act {
        width: 90px; text-align: center; color: #e9edf4; border-radius: 5px; padding: 5px 0;
        cursor: pointer; border: 1px solid rgba(255,255,255,0.12);
      }
      #cap {
        position: fixed; top: 14px; left: 14px;
        font: 700 14px/1 ui-sans-serif, system-ui, sans-serif;
        color: #e9edf4; background: rgba(24,27,34,0.82);
        border: 1px solid rgba(255,255,255,0.16); border-radius: 8px;
        padding: 10px 14px; backdrop-filter: blur(6px); user-select: none;
      }
      #roomOverlay {
        position: fixed; inset: 0; pointer-events: none; z-index: 5;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      .room-label {
        position: absolute; transform: translate(-50%, -50%);
        padding: 5px 9px; border-radius: 999px;
        color: rgba(236,241,248,0.92);
        background: rgba(20,24,30,0.58);
        border: 1px solid rgba(255,255,255,0.22);
        box-shadow: 0 2px 12px rgba(0,0,0,0.28);
        font: 800 12px/1 ui-sans-serif, system-ui, sans-serif;
        letter-spacing: 0.04em; text-transform: uppercase;
        text-shadow: 0 1px 2px #000;
        white-space: nowrap;
      }
      .warn-mark {
        position: absolute; transform: translate(-50%, -50%);
        width: 24px; height: 24px; border-radius: 50%;
        display: grid; place-items: center;
        color: #2a1700; background: #f5b642;
        border: 2px solid rgba(255,245,205,0.95);
        box-shadow: 0 3px 14px rgba(0,0,0,0.45);
        font: 900 16px/1 ui-sans-serif, system-ui, sans-serif;
        pointer-events: auto; cursor: help;
      }
      .build-preview {
        position: absolute;
        background: rgba(82, 165, 255, 0.24);
        border: 1px solid rgba(160, 215, 255, 0.85);
        box-shadow: 0 0 16px rgba(68, 150, 255, 0.35);
        pointer-events: none;
      }
      .build-preview-arrow {
        position: absolute; height: 3px; transform-origin: 0 50%;
        background: rgba(185, 225, 255, 0.95);
        box-shadow: 0 0 10px rgba(68, 150, 255, 0.6);
        pointer-events: none;
      }
      .build-preview-arrow::after {
        content: ""; position: absolute; right: -1px; top: -5px;
        border-left: 9px solid rgba(185, 225, 255, 0.95);
        border-top: 6px solid transparent; border-bottom: 6px solid transparent;
      }
      /* Hover tooltip */
      #tip {
        position: fixed; display: none; pointer-events: none; z-index: 10;
        font: 12px/1.45 ui-monospace, monospace; color: #e6eaf1; white-space: pre;
        background: rgba(14,16,20,0.92); border: 1px solid rgba(255,255,255,0.2);
        border-radius: 8px; padding: 8px 10px; max-width: 340px;
      }
      /* Bottom-centre build HUD */
      #build {
        position: fixed; left: 50%; bottom: 14px; transform: translateX(-50%);
        display: flex; flex-direction: column; align-items: center; gap: 8px;
        font: 600 13px/1 ui-sans-serif, system-ui, sans-serif; user-select: none;
      }
      #palette { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; max-width: 92vw; }
      #cats { display: flex; gap: 6px; }
      .build-cat, .build-item {
        color: #e9edf4; background: rgba(24,27,34,0.82);
        border: 1px solid rgba(255,255,255,0.16); border-radius: 8px;
        padding: 9px 14px; cursor: pointer; backdrop-filter: blur(6px);
        display: inline-flex; align-items: center; gap: 7px;
        transition: background 0.12s, border-color 0.12s;
      }
      .build-cat:hover, .build-item:hover { background: rgba(40,44,54,0.92); }
      .build-cat.on { background: rgba(60,90,140,0.92); border-color: rgba(140,180,240,0.7); }
      .build-item.on { background: rgba(60,120,90,0.92); border-color: rgba(140,230,170,0.7); }
      .sw { width: 13px; height: 13px; border-radius: 3px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.35); }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="gfx"></canvas>
    </div>
    <div id="roomOverlay"></div>
    <div id="cap">Prisoners: 0/0</div>
    <div id="hud"></div>
    <div id="clockbox">
      <div id="clock">Day 1 — 08:00</div>
      <div id="speeds"></div>
      <button id="regimeBtn">Regime: Free time</button>
    </div>
    <div id="regimePanel"></div>
    <div id="tip"></div>
    <button id="qualBtn" class="btn">Quality: High (4K)</button>
    <button id="roofBtn" class="btn">Roof: Solid</button>
    <div id="build">
      <div id="palette"></div>
      <div id="cats"></div>
    </div>
    <div id="err"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
